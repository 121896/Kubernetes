---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: webapp-nginx-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        name: nginx-pod
        app: webapp
    spec:
      containers:
      - name: nginx-container
        image: nginx:1.14
        ports:
        - containerPort: 80
