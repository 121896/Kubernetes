---
# kubectl create deploy mydeploy --image=nginx --replicas=4
kind: Deployment
apiVersion: apps/v1
metadata:
  name: webui
spec:
  replicas: 4
  selector:
    matchLabels:
      app: webui
  template:
    metadata:
      name: nginx-pod
      labels:
        app: webui
    spec:
      containers:
      - name: nginx-container
        image: nginx:1.27
